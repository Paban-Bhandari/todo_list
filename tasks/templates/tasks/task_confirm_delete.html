{% extends 'tasks/base.html' %}

{% block title %}Confirm Delete{% endblock %}
{% block header %}Confirm Delete{% endblock %}

{% block content %}
    <div class="confirm-delete">
        <div style="font-size: 48px; margin-bottom: 20px;">⚠️</div>
        <h1>Delete "{{ task.title }}"?</h1>
        <p>This action cannot be undone. The task will be permanently deleted.</p>
        
        <div class="confirm-actions">
            <form method="post" style="display: inline;">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger btn-large">Delete Task</button>
            </form>
            <a href="{% url 'task_list' %}" class="btn btn-secondary btn-large">Cancel</a>
        </div>
    </div>
{% endblock %}
